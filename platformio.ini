; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:uno]
platform = atmelavr
board = uno
framework = arduino
lib_deps = coryjfowler/mcp_can@^1.5.1
monitor_speed = 115200
build_flags =
    -I src
    -I src/Bsw/Can
    -I src/Bsw/CanIf
    -I src/Bsw/PduR
    -I src/Bsw/Com
    -I src/Bsw/Det
    -I src/Bsw/Dcm
    -I src/Bsw/Dem
    -I src/Bsw/NvM
    -I src/Bsw/CanTp
    -I src/Bsw/Port
    -I src/Bsw/CanSM
    -I src/Bsw/ComM
    -I src/Bsw/EcuM
    -I src/Bsw/BswM
    -I src/Bsw/WdgM
    -I src/Bsw/Mcu
    -I src/Bsw/FiM
    -I src/Bsw/IoHwAb
    -I src/Bsw/Adc
    -I src/Bsw/SchM
    -I src/Os
    -I src/Bsw/Dio
    -I src/Rte
    -I src/Asw

; R4 移行可否のフィーチャースパイク用 (検証専用、まだ常用しない)。
; 既存の [env:uno] (R3/AVR) はそのまま維持し、コンパイルエラーの内容だけを確認する。
[env:uno_r4]
platform = renesas-ra
board = uno_r4_minima
framework = arduino
lib_deps = coryjfowler/mcp_can@^1.5.1
monitor_speed = 115200
build_flags =
    -I src
    -I src/Bsw/Can
    -I src/Bsw/CanIf
    -I src/Bsw/PduR
    -I src/Bsw/Com
    -I src/Bsw/Det
    -I src/Bsw/Dcm
    -I src/Bsw/Dem
    -I src/Bsw/NvM
    -I src/Bsw/CanTp
    -I src/Bsw/Port
    -I src/Bsw/CanSM
    -I src/Bsw/ComM
    -I src/Bsw/EcuM
    -I src/Bsw/BswM
    -I src/Bsw/WdgM
    -I src/Bsw/Mcu
    -I src/Bsw/FiM
    -I src/Bsw/IoHwAb
    -I src/Bsw/Adc
    -I src/Bsw/SchM
    -I src/Os
    -I src/Bsw/Dio
    -I src/Rte
    -I src/Asw